name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scholarbridge
          POSTGRES_PASSWORD: scholarbridge
          POSTGRES_DB: scholarbridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scholarbridge -d scholarbridge_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://scholarbridge:scholarbridge@localhost:5432/scholarbridge_test?schema=public
      SESSION_SECRET: test-secret-key-for-ci-at-least-32-chars
      NODE_ENV: test
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare test database
        run: npx prisma db push

      - name: Type check
        run: npm run type-check || npx tsc --noEmit

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build
